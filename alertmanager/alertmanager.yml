global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 2h

  routes:
    - matchers:
        - severity = "critical"
      receiver: default
      group_wait: 5s

receivers:
  - name: default
    # 本機示範版本不設定真實通知（Slack / PagerDuty 等）
    # 如需整合可在此加入 slack_configs 或 webhook_configs

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname"]
