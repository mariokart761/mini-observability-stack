groups:
  - name: demo-alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[2m]))
            /
            sum(rate(http_requests_total[2m]))
          ) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "5xx ratio is {{ $value | humanizePercentage }} (threshold: 10%) for the last 2 minutes."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.path }}"
          description: "P95 latency is {{ $value | humanizeDuration }} on path {{ $labels.path }} (threshold: 2s)."

      - alert: HostCPUHigh
        expr: |
          100 - (
            avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100
          ) > 80
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host CPU usage is high on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 80%) for 5 minutes."

      - alert: ContainerMemoryHigh
        expr: |
          (
            container_memory_usage_bytes{name!=""}
            /
            container_spec_memory_limit_bytes{name!=""}
          ) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} memory is high"
          description: "Container {{ $labels.name }} memory usage is {{ $value | humanizePercentage }} of its limit."
